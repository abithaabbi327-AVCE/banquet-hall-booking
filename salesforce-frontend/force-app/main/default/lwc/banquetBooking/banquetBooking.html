<template>
    <lightning-card title="Banquet Hall Booking CRM">
        <div class="slds-p-around_medium">
            
            <lightning-input label="Name" value={name} onchange={handleChange} data-field="name"></lightning-input>
            
            <lightning-input label="Email" value={email} onchange={handleChange} data-field="email"></lightning-input>
            
            <lightning-input label="Phone" value={phone} onchange={handleChange} data-field="phone"></lightning-input>
            
            <lightning-input type="date" label="Event Date" value={eventDate} onchange={handleChange} data-field="eventDate"></lightning-input>
            
            <lightning-input type="number" label="Guests" value={guests} onchange={handleChange} data-field="guests"></lightning-input>

            <lightning-button label="Book Now" variant="brand" onclick={handleSubmit} class="slds-m-top_medium"></lightning-button>
        </div>

        <template if:true={bookings}>
            <div class="slds-p-around_medium">
                <h3>Bookings</h3>
                <template for:each={bookings} for:item="booking">
                    <p key={booking.Id}>
                        {booking.Name} - {booking.Event_Date__c} - {booking.Status__c}
                    </p>
                </template>
            </div>
        </template>
    </lightning-card>
</template>
